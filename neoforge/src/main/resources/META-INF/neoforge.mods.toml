[[dependencies.protomod]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.10,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.protomod]]
modId = "geckolib"
type = "required"
versionRange = "[0,)"
ordering = "NONE"
side = "BOTH"

[[mixins]]
config = "protomod.mixins.json"
